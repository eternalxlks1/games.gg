<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>games.gg</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
 

<style>
  body {
    background: #ffffff;
  }

  .logo {
    font-weight: bold;
    font-size: 22px;
  }

  .product {
    border: 1px solid #ddd;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 15px;
  }

  .muted {
    color: #6c757d;
    font-size: 14px;
  }

  .cart-box {
    border: 1px solid #ddd;
    padding: 15px;
    position: sticky;
    top: 20px;
  }

  button {
    width: 100%;
  }
</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="blog-header lh-1 py-3 border-bottom">
    <div class="row flex-nowrap justify-content-between align-items-center">

      <div class="col-4">
        <span class="logo">games.gg</span>
      </div>

      <div class="col-4 text-center">
        <small class="text-muted">gaming gear store</small>
      </div>

      <div class="col-4 text-end">
        <span>Cart: <span id="count">0</span></span>
      </div>

    </div>
  </header>

  <div class="row mt-4">

    <!-- PRODUCTS -->
    <div class="col-md-8">

      <div class="product">
        <h5>Pro Gaming Mouse</h5>
        <p class="muted">standard mouse, works for games</p>
        <p>$49.99</p>
        <button class="btn btn-outline-primary btn-sm" onclick="add('Pro Gaming Mouse',49.99)">add</button>
      </div>

      <div class="product">
        <h5>RGB Keyboard</h5>
        <p class="muted">lights included, performance unchanged</p>
        <p>$89.99</p>
        <button class="btn btn-outline-primary btn-sm" onclick="add('RGB Keyboard',89.99)">add</button>
      </div>

      <div class="product">
        <h5>Studio Microphone</h5>
        <p class="muted">you will sound the same, but louder</p>
        <p>$79.99</p>
        <button class="btn btn-outline-primary btn-sm" onclick="add('Microphone',79.99)">add</button>
      </div>

      <div class="product">
        <h5>Gaming Headset</h5>
        <p class="muted">sound goes in ears</p>
        <p>$59.99</p>
        <button class="btn btn-outline-primary btn-sm" onclick="add('Headset',59.99)">add</button>
      </div>

    </div>

    <!-- CART -->
    <div class="col-md-4">

      <div class="cart-box">
        <h5>cart</h5>
        <div id="cart"></div>

        <hr>

        <p>Total: $<span id="total">0</span></p>

        <button class="btn btn-success btn-sm" onclick="checkout()">checkout</button>
      </div>

    </div>

  </div>

</div>

<script>
let cart = [];

function add(name, price) {
  cart.push({name, price});
  render();
}

function render() {
  document.getElementById("count").innerText = cart.length;

  let html = "";
  let total = 0;

  cart.forEach((item) => {
    total += item.price;
    html += `<div>${item.name} - $${item.price}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
}

function checkout() {
  alert("checkout complete");
  cart = [];
  render();
}

render();
</script>

</body>
</html>
